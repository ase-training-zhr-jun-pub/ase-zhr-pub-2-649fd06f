name: Backend CI/CD

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - "backend.Tests/**"
      - ".github/workflows/backend.yml"
  pull_request:
    paths:
      - "backend/**"
      - "backend.Tests/**"
      - ".github/workflows/backend.yml"

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"

      - name: Restore
        run: dotnet restore backend.Tests/CalvinBookingService.Tests.csproj

      - name: Test
        env:
          DOTNET_SYSTEM_GLOBALIZATION_INVARIANT: "1"
        run: |
          dotnet test backend.Tests/CalvinBookingService.Tests.csproj \
            --no-restore \
            --logger "trx;LogFileName=results.trx" \
            --results-directory ./test-results

      - name: Report test results
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: xUnit Tests
          path: test-results/results.trx
          reporter: dotnet-trx

  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/calvin-backend
          tags: |
            type=sha,prefix=,format=short
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
